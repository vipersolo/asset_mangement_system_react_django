{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Active Assignments</h2>
    <a href="{% url 'assign_asset' %}" class="btn btn-success">Assign New Asset</a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Employee</th>
                    <th>Assigned Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for a in assignments %}
                <tr>
                    <td>{{ a.asset.name }}</td>
                    <td>{{ a.employee.username }}</td>
                    <td>{{ a.date_assigned }}</td>
                    <td>
                        <a href="{% url 'return_asset' a.pk %}" class="btn btn-sm btn-outline-danger">Check-In (Return)</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No active assignments.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
