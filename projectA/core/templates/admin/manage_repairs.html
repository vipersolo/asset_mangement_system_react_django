v{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h3>Repair Management</h3>
    
    <div class="card shadow mb-4">
        <div class="card-header bg-danger text-white">Unassigned Tickets</div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Issue</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in unassigned %}
                    <tr>
                        <td>{{ t.asset.name }}</td>
                        <td>{{ t.issue }}</td>
                        <td>
                            <a href="{% url 'assign_technician' t.id %}" class="btn btn-sm btn-primary">Assign Technician</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="3" class="text-center text-muted">No unassigned tickets.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
